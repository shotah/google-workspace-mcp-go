version: "2"
linters:
  enable:
    - bodyclose
    - copyloopvar
    - dupword
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forcetypeassert
    - goconst
    - gocritic
    - gomodguard_v2
    - gosec
    - intrange
    - misspell
    - modernize
    - nestif
    - nilerr
    - nilnil
    - perfsprint
    - prealloc
    - predeclared
    - revive
    - sqlclosecheck
    - unconvert
    - unparam
    - usestdlibvars
  settings:
    goconst:
      min-len: 3
      min-occurrences: 5
      ignore-tests: true
    gocritic:
      disabled-checks:
        - hugeParam
        - unnamedResult
        - paramTypeCombine
        - rangeValCopy
        # Handler control-flow / Google filter quoting — churny without real bugs.
        - nestingReduce
        - ifElseChain
        - sprintfQuotedString
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: unused-parameter
          disabled: true
        - name: blank-imports
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # MCP handlers return (ToolResult, nil) with the error text in the result — intentional.
      - linters:
          - nilerr
        path: tools/
      # Schema JSON types / placeholders / tier names repeat across tools by design.
      - linters:
          - goconst
        path: tools/
      # google.golang.org/api *.New → NewService migration is a separate effort.
      - linters:
          - staticcheck
        text: "SA1019:"
        path: tools/
      # OAuth endpoint URLs and credential JSON fields trip secret heuristics.
      - linters:
          - gosec
        text: "G101:"
      - linters:
          - gosec
        text: "G117:"
      # Credential lookup returns (nil, nil) when no file exists — caller distinguishes.
      - linters:
          - nilnil
        path: auth/credentials\.go
      - linters:
          - goconst
          - gosec
          - errcheck
          - revive
          - forcetypeassert
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
